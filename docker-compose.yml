services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: workout
      POSTGRES_USER: workout
      POSTGRES_PASSWORD: workout
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workout -d workout"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/workout
      SPRING_DATASOURCE_USERNAME: workout
      SPRING_DATASOURCE_PASSWORD: workout
      # Same-origin over HTTP at localhost:8080 in this compose setup, so the
      # refresh cookie stays non-Secure. Override for an HTTPS deployment.
      JWT_SECRET: ${JWT_SECRET:-dev-compose-secret-change-me-0123456789-abcdefghijklmnopqrstuvwxyz}
      AUTH_COOKIE_SECURE: "false"
      # Set SPRING_PROFILES_ACTIVE=demo on the host to seed a demo user with months of
      # backdated workouts on first boot (idempotent). Leave unset for a normal run.
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
    ports:
      - "8080:8080"

volumes:
  pgdata:
