spring:
  application:
    name: workout
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/workout}
    username: ${SPRING_DATASOURCE_USERNAME:workout}
    password: ${SPRING_DATASOURCE_PASSWORD:workout}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  security:
    jwt:
      # Production MUST set JWT_SECRET. The dev fallback is intentionally long
      # (>= 256 bits) so HS256 key derivation works out of the box locally.
      secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-0123456789-abcdefghijklmnopqrstuvwxyz}
      issuer: workout-thesis
      access-ttl: 15m
      refresh-ttl: 14d
    cookie:
      # false for local HTTP; the prod profile flips this to true for HTTPS.
      secure: ${AUTH_COOKIE_SECURE:false}
      name: refresh_token
    cors:
      allowed-origins: ${AUTH_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  search:
    # OpenSearch-backed derived search read model. Disabled by default so the app (and the full
    # Testcontainers test suite) runs without an OpenSearch node; docker-compose flips it on.
    # When disabled, /api/search/** returns 503 and the UI falls back to the SQL browse/list.
    enabled: ${APP_SEARCH_ENABLED:false}
    uri: ${APP_SEARCH_URI:http://localhost:9200}
    connect-timeout-ms: 2000
    socket-timeout-ms: 5000
    templates-index: templates_v1
    templates-alias: templates
    sessions-index: workout_sessions_v1
    sessions-alias: workout_sessions
